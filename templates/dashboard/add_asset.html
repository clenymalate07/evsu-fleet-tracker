{% extends 'base.html' %}

{% block content %}

<style>

.page-title{
    font-size:50px;
    font-weight:500;
    margin-bottom:30px;
}

.form-card{
    background:white;
    border-radius:28px;
    padding:40px;
    max-width:700px;
    box-shadow:0 0 25px rgba(0,0,0,0.06);
}

.form-group{
    margin-bottom:24px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    font-size:16px;
    color:#334155;
}

.form-control{
    width:100%;
    padding:16px;
    border-radius:16px;
    border:1px solid #d1d5db;
    font-size:15px;
    outline:none;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.15);
}

.submit-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:16px 24px;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    background:#1d4ed8;
}

</style>

<h1 class="page-title">
    Add Asset
</h1>

<div class="form-card">

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">

            <label>Asset Name</label>

            {{ form.name }}

        </div>

        <div class="form-group">

            <label>Asset Type</label>

            {{ form.asset_type }}

        </div>

        <div class="form-group">

            <label>Status</label>

            {{ form.status }}

        </div>

        <div class="form-group">

            <label>Assigned To</label>

            {{ form.assigned_to }}

        </div>

        <div class="form-group">

            <label>Price</label>

            {{ form.price }}

        </div>

        <button type="submit"
                class="submit-btn">

            Save Asset

        </button>

    </form>

</div>

<script>

document.getElementById("id_name").classList.add("form-control");

document.getElementById("id_asset_type").classList.add("form-control");

document.getElementById("id_status").classList.add("form-control");

document.getElementById("id_assigned_to").classList.add("form-control");

document.getElementById("id_price").classList.add("form-control");

</script>

{% endblock %}
