{% extends 'base.html' %}

{% block content %}

<style>

    .search-wrapper{

    margin-bottom:20px;
}

.search-input{

    width:100%;
    padding:14px 18px;
    border-radius:14px;
    border:1px solid #d1d5db;
    outline:none;
    font-size:15px;
    transition:0.3s ease;
}

.search-input:focus{

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,0.15);
}
    .page-title{

        font-size:52px;

        font-weight:700;

        margin-bottom:30px;

        color:#0f172a;
    }

    .page-card{

        background:white;

        border-radius:24px;

        padding:24px;

        border:1px solid #e5e7eb;

        box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }



    .main-table{

        width:100%;

        border-collapse:collapse;
    }



    .main-table th{

        background:#1e293b;

        color:white;

        padding:18px;

        text-align:left;
    }



    .main-table td{

        padding:18px;

        border-bottom:1px solid #e5e7eb;

        color:#111827;

        background:white;
    }



    .main-table tr{

        transition:0.3s ease;
    }



    .main-table tr:hover{

        background:#f8fafc;
    }



    .empty-text{

        text-align:center;

        padding:40px;

        color:#64748b;

        font-size:18px;
    }



    @media(max-width:768px){

        .page-title{

            font-size:30px;
        }

    }

</style>


<h2 class="page-title">

    Activity Logs

</h2>
<div class="search-wrapper">

    <input
        type="text"
        id="logSearch"
        class="search-input"
        placeholder="Search user or action..."
    >

</div>



<div class="page-card">

    <table class="main-table">

        <thead>

            <tr>

                <th>
                    User
                </th>

                <th>
                    Action
                </th>

                <th>
                    Date & Time
                </th>

            </tr>

        </thead>



             <tbody>

                {% for log in logs %}

                <tr class="log-row">

                    <td>

                        {{ log.user }}

                    </td>

                    <td>

                        {{ log.action }}

                    </td>

                    <td>

                        {{ log.created_at|date:"M d, Y h:i A" }}

                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="3">

                        No activity logs found.

                    </td>

                </tr>

                {% endfor %}

            </tbody>
    </table>

</div>

    <script>

        const logSearch =
        document.getElementById('logSearch');

        const logRows =
        document.querySelectorAll('.log-row');

        function filterLogs() {

            const value =
            logSearch.value.toLowerCase().trim();

            logRows.forEach(row => {

                const user =
                row.children[0].innerText.toLowerCase();

                const action =
                row.children[1].innerText.toLowerCase();

                const datetime =
                row.children[2].innerText.toLowerCase();

                const combinedText =
                `${user} ${action} ${datetime}`;

                if(combinedText.includes(value)) {

                    row.style.display = '';

                } else {

                    row.style.display = 'none';
                }

            });

        }

        logSearch.addEventListener(
            'input',
            filterLogs
        );
        
    </script>

{% endblock %}
